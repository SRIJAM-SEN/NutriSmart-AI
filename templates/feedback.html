<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Feedback</title>

    <!-- Bootstrap -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Font Awesome -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"
    >

    <style>

        body {

            background:
                linear-gradient(
                    rgba(0,0,0,0.6),
                    rgba(0,0,0,0.6)
                ),

                url("https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1920&q=80");

            background-size: cover;

            background-position: center;

            background-attachment: fixed;

            min-height: 100vh;

            font-family: 'Segoe UI', sans-serif;

        }

        .feedback-container {

            max-width: 850px;

            margin: 40px auto;

            background: rgba(255,255,255,0.95);

            padding: 30px;

            border-radius: 20px;

            box-shadow: 0 0 25px rgba(0,0,0,0.3);

        }

        .page-title {

            text-align: center;

            font-weight: 700;

            color: #198754;

            margin-bottom: 30px;

        }

        .rating-stars {

            display: flex;

            gap: 8px;

            flex-wrap: wrap;

        }

        .rating-stars i {

            font-size: 2rem;

            color: #ccc;

            cursor: pointer;

            transition: 0.2s;

        }

        .rating-stars i.active {

            color: #ffc107;

        }

        .review-card {

            background: #fff;

            border-radius: 12px;

            padding: 15px;

            border: 1px solid #ddd;

            margin-bottom: 15px;

            box-shadow: 0 0 10px rgba(0,0,0,0.08);

            word-wrap: break-word;

        }

        .review-user {

            font-weight: bold;

            color: #198754;

            font-size: 1.1rem;

        }

        .review-stars {

            color: #ffc107;

            font-size: 1rem;

        }

        .delete-btn {

            margin-top: 10px;

        }

        /* ================= RESPONSIVE ================= */

        @media (max-width: 768px) {

            .feedback-container {

                margin: 20px 10px;

                padding: 20px;

            }

            .page-title {

                font-size: 2rem;

            }

            .rating-stars i {

                font-size: 1.7rem;

            }

        }

        @media (max-width: 576px) {

            body {

                background-attachment: scroll;

            }

            .feedback-container {

                margin: 10px;

                padding: 15px;

                border-radius: 15px;

            }

            .page-title {

                font-size: 1.6rem;

                margin-bottom: 20px;

            }

            .rating-stars {

                justify-content: center;

            }

            .rating-stars i {

                font-size: 1.5rem;

            }

            .review-card {

                padding: 12px;

            }

            .review-user {

                font-size: 1rem;

            }

            .review-stars {

                font-size: 0.9rem;

            }

            .btn {

                font-size: 0.95rem;

            }

            .delete-btn {

                width: 100%;

            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="feedback-container">

        <h1 class="page-title">
            ⭐ Project Feedback ⭐
        </h1>

        <!-- USER NAME -->
        <div class="mb-3">

            <label class="form-label">
                Your Name
            </label>

            <input
                type="text"
                id="username"
                class="form-control"
                placeholder="Enter your name"
            >

        </div>

        <!-- EMAIL -->
        <div class="mb-3">

            <label class="form-label">
                Email Address
            </label>

            <input
                type="email"
                id="email"
                class="form-control"
                placeholder="Enter your email"
            >

        </div>

        <!-- STAR RATING -->
        <div class="mb-3">

            <label class="form-label">
                Give Rating
            </label>

            <div class="rating-stars">

                <i class="fa-solid fa-star" data-value="1"></i>
                <i class="fa-solid fa-star" data-value="2"></i>
                <i class="fa-solid fa-star" data-value="3"></i>
                <i class="fa-solid fa-star" data-value="4"></i>
                <i class="fa-solid fa-star" data-value="5"></i>

            </div>

        </div>

        <!-- FEEDBACK -->
        <div class="mb-3">

            <label class="form-label">
                Your Feedback
            </label>

            <textarea
                id="comment"
                class="form-control"
                rows="4"
                placeholder="Write your feedback..."
            ></textarea>

        </div>

        <!-- SUBMIT BUTTON -->
        <button
            class="btn btn-success w-100"
            onclick="submitFeedback()"
        >

            Submit Feedback

        </button>

        <hr class="my-4">

        <!-- REVIEWS -->
        <h3 class="mb-3">
            User Reviews
        </h3>

        <div id="reviews-container"></div>

    </div>

</div>

<script>

let selectedRating = 0;


// ================= STAR RATING =================

const stars =
    document.querySelectorAll('.rating-stars i');

stars.forEach(star => {

    star.addEventListener('click', () => {

        selectedRating =
            parseInt(
                star.getAttribute('data-value')
            );

        updateStars();

    });

});


function updateStars() {

    stars.forEach(star => {

        const value =
            parseInt(
                star.getAttribute('data-value')
            );

        if (value <= selectedRating) {

            star.classList.add('active');

        } else {

            star.classList.remove('active');

        }

    });

}


// ================= SUBMIT FEEDBACK =================

function submitFeedback() {

    const username =
        document.getElementById('username')
        .value.trim();

    const email =
        document.getElementById('email')
        .value.trim();

    const comment =
        document.getElementById('comment')
        .value.trim();

    if (
        username === "" ||
        email === "" ||
        comment === "" ||
        selectedRating === 0
    ) {

        alert(
            "Please fill all fields and select rating!"
        );

        return;

    }

    const feedback = {

        username: username,

        email: email,

        comment: comment,

        rating: selectedRating

    };

    let feedbacks =
        JSON.parse(
            localStorage.getItem(
                'project_feedbacks'
            )
        ) || [];

    feedbacks.push(feedback);

    localStorage.setItem(
        'project_feedbacks',
        JSON.stringify(feedbacks)
    );

    // Clear form
    document.getElementById('username').value = "";

    document.getElementById('email').value = "";

    document.getElementById('comment').value = "";

    selectedRating = 0;

    updateStars();

    loadFeedbacks();

}


// ================= LOAD FEEDBACKS =================

function loadFeedbacks() {

    const container =
        document.getElementById(
            'reviews-container'
        );

    container.innerHTML = "";

    let feedbacks =
        JSON.parse(
            localStorage.getItem(
                'project_feedbacks'
            )
        ) || [];

    feedbacks.reverse().forEach((feedback, index) => {

        let starsHTML = "";

        for (
            let i = 0;
            i < feedback.rating;
            i++
        ) {

            starsHTML +=
                `<i class="fa-solid fa-star"></i>`;

        }

        container.innerHTML += `

            <div class="review-card">

                <div class="d-flex justify-content-between align-items-start flex-wrap">

                    <div>

                        <span class="review-user">

                            ${feedback.username}

                        </span>

                        <br>

                        <small class="text-muted">

                            ${feedback.email}

                        </small>

                    </div>

                    <span class="review-stars">

                        ${starsHTML}

                    </span>

                </div>

                <p class="mt-3 mb-2">

                    ${feedback.comment}

                </p>

                <button
                    class="btn btn-sm btn-danger delete-btn"
                    onclick="deleteFeedback(${index})"
                >

                    Delete

                </button>

            </div>

        `;

    });

}


// ================= DELETE FEEDBACK =================

function deleteFeedback(index) {

    let feedbacks =
        JSON.parse(
            localStorage.getItem(
                'project_feedbacks'
            )
        ) || [];

    feedbacks.reverse();

    feedbacks.splice(index, 1);

    feedbacks.reverse();

    localStorage.setItem(
        'project_feedbacks',
        JSON.stringify(feedbacks)
    );

    loadFeedbacks();

}


// Initial Load
loadFeedbacks();

</script>

</body>

</html>
